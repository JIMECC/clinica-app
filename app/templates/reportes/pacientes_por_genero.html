<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pacientes por Género</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Reporte: Pacientes por Género</h2>
  <a href="/" class="btn btn-secondary mb-3">Volver al inicio</a>
  <table class="table table-striped table-bordered">
    <thead class="thead-dark">
      <tr><th>Género</th><th>Total</th></tr>
    </thead>
    <tbody>
      {% for row in datos %}
      <tr>
        <td>{{ row.genero or 'No especificado' }}</td>
        <td>{{ row.total }}</td>
      </tr>
      {% else %}
      <tr><td colspan="2" class="text-center">Sin datos</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <canvas id="g2" height="100"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  new Chart(document.getElementById('g2'), {
    type: 'pie',
    data: {
      labels: [{% for r in datos %}"{{ r.genero or 'No esp' }}"{% if not loop.last %},{% endif %}{% endfor %}],
      datasets: [{ data: [{% for r in datos %}{{ r.total }}{% if not loop.last %},{% endif %}{% endfor %}], backgroundColor: ['rgba(255,99,132,0.7)','rgba(54,162,235,0.7)','rgba(255,206,86,0.7)'] }]
    }
  });
</script>
</body>
</html>
