{% extends "appbuilder/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2><i class="fa fa-users"></i> Reporte: Pacientes por Género</h2>
  <p class="text-muted">Persona 2</p>
  <table class="table table-striped table-bordered">
    <thead class="thead-dark">
      <tr><th>Género</th><th>Total</th></tr>
    </thead>
    <tbody>
      {% for row in datos %}
      <tr>
        <td>{{ row.genero or 'No especificado' }}</td>
        <td><span class="badge badge-success">{{ row.total }}</span></td>
      </tr>
      {% else %}
      <tr><td colspan="2" class="text-center">Sin datos</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <canvas id="graficaGenero" height="100"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const labels2 = [{% for row in datos %}"{{ row.genero or 'No especificado' }}"{% if not loop.last %},{% endif %}{% endfor %}];
  const values2 = [{% for row in datos %}{{ row.total }}{% if not loop.last %},{% endif %}{% endfor %}];
  new Chart(document.getElementById('graficaGenero'), {
    type: 'pie',
    data: { labels: labels2, datasets: [{ data: values2, backgroundColor: ['rgba(255,99,132,0.7)','rgba(54,162,235,0.7)','rgba(255,206,86,0.7)'] }] },
    options: { responsive: true }
  });
</script>
{% endblock %}
