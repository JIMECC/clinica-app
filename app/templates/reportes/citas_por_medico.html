{% extends "appbuilder/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2><i class="fa fa-chart-bar"></i> Reporte: Citas por Médico</h2>
  <p class="text-muted">Persona 1</p>
  <table class="table table-striped table-bordered">
    <thead class="thead-dark">
      <tr><th>#</th><th>Médico</th><th>Total Citas</th></tr>
    </thead>
    <tbody>
      {% for row in datos %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ row.nombre }} {{ row.apellido }}</td>
        <td><span class="badge badge-primary">{{ row.total }}</span></td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center">Sin datos</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <canvas id="graficaCitas" height="100"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const labels1 = [{% for row in datos %}"{{ row.nombre }} {{ row.apellido }}"{% if not loop.last %},{% endif %}{% endfor %}];
  const values1 = [{% for row in datos %}{{ row.total }}{% if not loop.last %},{% endif %}{% endfor %}];
  new Chart(document.getElementById('graficaCitas'), {
    type: 'bar',
    data: { labels: labels1, datasets: [{ label: 'Citas', data: values1, backgroundColor: 'rgba(54,162,235,0.7)' }] },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
</script>
{% endblock %}
