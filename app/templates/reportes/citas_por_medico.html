<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Citas por Médico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Reporte: Citas por Médico</h2>
  <a href="/" class="btn btn-secondary mb-3">Volver al inicio</a>
  <table class="table table-striped table-bordered">
    <thead class="thead-dark">
      <tr><th>#</th><th>Médico</th><th>Total Citas</th></tr>
    </thead>
    <tbody>
      {% for row in datos %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ row.nombre }} {{ row.apellido }}</td>
        <td>{{ row.total }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center">Sin datos</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <canvas id="g1" height="100"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  new Chart(document.getElementById('g1'), {
    type: 'bar',
    data: {
      labels: [{% for r in datos %}"{{ r.nombre }}"{% if not loop.last %},{% endif %}{% endfor %}],
      datasets: [{ label: 'Citas', data: [{% for r in datos %}{{ r.total }}{% if not loop.last %},{% endif %}{% endfor %}], backgroundColor: 'rgba(54,162,235,0.7)' }]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
</script>
</body>
</html>
