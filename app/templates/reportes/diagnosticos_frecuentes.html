<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Medicamentos Frecuentes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Reporte: Medicamentos más Recetados</h2>
  <a href="/" class="btn btn-secondary mb-3">Volver al inicio</a>
  <table class="table table-striped table-bordered">
    <thead class="thead-dark">
      <tr><th>#</th><th>Medicamento</th><th>Veces Recetado</th></tr>
    </thead>
    <tbody>
      {% for row in datos %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ row.nombre }}</td>
        <td>{{ row.total }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center">Sin datos</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <canvas id="g3" height="100"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  new Chart(document.getElementById('g3'), {
    type: 'line',
    data: {
      labels: [{% for r in datos %}"{{ r.nombre }}"{% if not loop.last %},{% endif %}{% endfor %}],
      datasets: [{ label: 'Recetado', data: [{% for r in datos %}{{ r.total }}{% if not loop.last %},{% endif %}{% endfor %}], borderColor: 'rgba(255,159,64,1)', backgroundColor: 'rgba(255,159,64,0.2)', fill: true }]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
</script>
</body>
</html>
